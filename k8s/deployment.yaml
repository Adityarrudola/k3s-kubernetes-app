apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      containers:
        - name: sample-app
          image: onpremcicdacr.azurecr.io/sample-app:latest
          ports:
            - containerPort: 80
      imagePullSecrets:
        - name: acr-secret